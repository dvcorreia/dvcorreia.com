# Base URL used when generating links to your pages
# Set to the URL for your site
baseURL = "https://dvcorreia.com"

languageCode = "en-US"
timeZone = "Europe/London"

# Basic metadata configuration for your blog.
title = "Diogo Correia's website"
author = 'Diogo Correia'



[params]
  description = "You’ve reached the internet home of Diogo Correia. Here you will find posts about things that I'm not qualified enough to talk about."

enableGitInfo = true

[taxonomies]
  category = 'categories'
  tag = 'tags'

[menus]
  #[[menus.main]]
  #  name = "Home"
  #  pageRef = "/"
  #  weight = 10

  [[menus.main]]
    name = "Posts"
    pageRef = "/posts"
    weight = 20

  [[menus.main]]
    name = "About"
    pageRef = "/about"
    weight = 30

[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.highlight]
    noclasses = false
    tabWidth = 2

[module]
  [module.hugoVersion]
    extended = false
    min = "0.146.0"

