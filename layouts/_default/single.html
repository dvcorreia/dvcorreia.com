{{ define "main" }}

<article>
  <header>
    <h1>{{ .Title }}</h1>
    {{ if not .Date.IsZero }}
    <i>
      <time datetime='{{ .Date.Format "02 Jan, 2006" }}' pubdate>
        {{ .Date.Format "02 Jan, 2006" }}
      </time>
    </i>
    {{ end }}
  </header>

  {{ .Content }}

  <p>
    {{ range (.GetTerms "tags") }}
    <a href="{{ .Permalink }}">#{{ .LinkTitle }}</a>
    {{ end }}
  </p>
</article>

{{ end }}
