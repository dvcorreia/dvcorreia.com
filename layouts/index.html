{{ define "main" }}
{{ .Content }}

<h2>Latests posts</h2>
<ul class="blog-posts">
    {{- range ( where site.RegularPages "Section" "blog" | first 5 ) }}
    <li>
        <span>
          <i>
            <time datetime='{{ .Date.Format "2006-01-02" }}' pubdate>
              {{ .Date.Format (default "02 Jan, 2006" .Site.Params.dateFormat) }}
            </time>
          </i>
        </span>
        <a href="{{ .Permalink }}">{{ .Title }}</a>
    </li>
    {{ else }}
    <li>
        No posts yet
    </li>
    {{- end}}
</ul>
{{ end }}
