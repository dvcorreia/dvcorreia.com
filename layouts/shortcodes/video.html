{{- /*
  Renders a video optimized for web browsers.

  @context {src} text - The path to the video file, without extension

  @example: {{< video "path/to/video" >}}
  */}}

{{- $src := .Get 0 -}}

<video controls>
  <source src="{{ $src }}.av1.mp4" type="video/mp4; codecs=av01.0.05M.08,opus">
  <source src="{{ $src }}.h264.mp4" type="video/mp4; codecs=avc1.4D401E,mp4a.40.2">
  Your browser does not support the video tag.
</video>
